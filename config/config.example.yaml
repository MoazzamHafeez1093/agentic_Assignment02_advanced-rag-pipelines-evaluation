# Copy to config.yaml and fill in. Do not commit config.yaml with secrets.
#
# LLM / API: Do NOT use OpenAI. Use Groq (free tier) or another free LLM provider.
# Get a free Groq API key at: https://console.groq.com/keys
#
# Dataset path (relative to project root)
dataset_path: "dataset/crag_task_1_and_2_dev_v4.jsonl"

# Embedding model (sentence-transformers model name)
embedding_model: "all-MiniLM-L6-v2"

# Groq API key — required for all LLM calls (generation, confidence, query variants, HyDE)
groq_api_key: "YOUR_GROQ_API_KEY_HERE"

# LLM for generation via Groq. Other fast options: llama-3.3-70b-versatile, mixtral-8x7b-32768
generation_model: "llama-3.1-8b-instant"

# Top-k chunks to retrieve from the global index per query
top_k: 5

# Path prefix to save/load the FAISS index (avoids rebuilding on every run)
index_path: "dataset/crag_index"
